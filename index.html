<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div id="calculator-container">
        <div class="display">0</div>
        <div class="buttons">
            <button id="delete">DEL</button>
            <button id="clear">AC</button>
            <button class="operator-button" id="square-root">√</button>
            <button class="operator-button" id="exponent">xⁿ</button>
            <button class="number-button">7</button>
            <button class="number-button">8</button>
            <button class="number-button">9</button>
            <button class="operator-button" id="divide">÷</button>
            <button class="number-button">4</button>
            <button class="number-button">5</button>
            <button class="number-button">6</button>
            <button class="operator-button" id="multiply">x</button>
            <button class="number-button">1</button>
            <button class="number-button">2</button>
            <button class="number-button">3</button>
            <button class="operator-button" id="subtract">-</button>
            <button id="decimal-point">.</button>
            <button class="number-button">0</button>
            <button id="equal-sign">=</button>
            <button class="operator-button" id="add">+</button>
        </div>
    </div>
</body>
</html>
